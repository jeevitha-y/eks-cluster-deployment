---
apiVersion: v1
kind: Namespace
metadata:
  name: game-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-deployment
  namespace: game-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: game-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: game-app
    spec:
      containers:
      - name: game-container
        image: public.ecr.aws/h2l3f6o7/game-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: game-app
spec:
  selector:
    app.kubernetes.io/name: game-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: game-ingress
  namespace: game-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: game-service
            port:
              number: 80